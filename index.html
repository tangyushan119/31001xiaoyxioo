<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海岛生存建造游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #build-panel {
            width: 120px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .category-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .category-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(74, 222, 128, 0.5);
            transform: translateX(2px);
        }

        .category-btn.active {
            background: rgba(74, 222, 128, 0.3);
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .category-icon {
            font-size: 18px;
        }

        .category-name {
            flex: 1;
            text-align: center;
            margin: 0 8px;
        }

        .category-arrow {
            font-size: 12px;
            transition: transform 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .category-btn.active .category-arrow {
            transform: rotate(90deg);
        }

        .sub-items {
            display: none;
            flex-direction: column;
            gap: 6px;
            padding-left: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sub-items.expanded {
            display: flex;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .build-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            cursor: grab;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            background: rgba(255, 255, 255, 0.15);
            user-select: none;
        }

        .build-item:hover {
            transform: scale(1.1);
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .build-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .build-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .build-item.can-afford {
            border-color: rgba(74, 222, 128, 0.5);
            background: rgba(74, 222, 128, 0.1);
            animation: afford-glow 2s ease-in-out infinite;
        }

        @keyframes afford-glow {
            0%, 100% { 
                box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
                border-color: rgba(74, 222, 128, 0.5);
            }
            50% { 
                box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
                border-color: rgba(74, 222, 128, 0.8);
            }
        }

        .build-item.selected {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.3);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            animation: selected-pulse 1.5s ease-in-out infinite;
        }

        @keyframes selected-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
            50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.8); }
        }

        .build-item.inventory-btn {
            cursor: pointer;
            background: rgba(52, 152, 219, 0.3);
            border-color: rgba(52, 152, 219, 0.5);
        }

        .build-item.inventory-btn:hover {
            transform: scale(1.1);
            border-color: #3498db;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
            background: rgba(52, 152, 219, 0.4);
        }

        #game-canvas {
            flex: 1;
            display: block;
            background: #1a1a2e;
        }

        #info-panel {
            width: 140px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }

        .info-item label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .info-item value {
            font-size: 20px;
            font-weight: bold;
            color: #4ade80;
        }

        #reset-btn {
            margin-top: auto;
            padding: 10px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #reset-btn:hover {
            background: rgba(231, 76, 60, 1);
            transform: scale(1.05);
        }

        #drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-size: 24px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #drag-overlay.active {
            display: flex;
        }

        #drag-overlay .drag-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 2px solid #4ade80;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1001;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .inventory-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .inventory-header {
            margin-bottom: 15px;
        }

        .inventory-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .close-btn {
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(231, 76, 60, 1);
            transform: scale(1.1);
        }

        .gold-display {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            margin-bottom: 8px;
        }

        .gold-emoji {
            font-size: 18px;
        }

        .gold-amount {
            color: #fbbf24;
            font-size: 16px;
            font-weight: 700;
        }

        .inventory-header h3 {
            color: white;
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .storage-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .storage-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .storage-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 4px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .storage-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            min-width: 60px;
            text-align: right;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-tab:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .category-tab.active {
            background: #4ade80;
            color: #1a1a2e;
            font-weight: 600;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .inventory-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .inventory-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }

        .item-emoji {
            font-size: 28px;
            line-height: 1;
        }

        .item-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-top: 4px;
        }

        .inventory-tooltip {
            position: fixed;
            background: rgba(30, 30, 50, 0.95);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            pointer-events: none;
            min-width: 150px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tooltip-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tooltip-emoji {
            font-size: 20px;
        }

        .tooltip-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .tooltip-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        .tooltip-info strong {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="build-panel">
            <div class="category-group">
                <button class="category-btn" data-category="buildings">
                    <span class="category-icon">🏠</span>
                    <span class="category-name">建筑</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="buildings">
                    <div class="build-item" data-type="residence" draggable="true" title="民居 - 自动产金币">🏠</div>
                    <div class="build-item" data-type="storageHouse" draggable="true" title="储物仓库 - 扩容资源存储">🏠</div>
                    <div class="build-item" data-type="house" draggable="true" title="房屋">🏠</div>
                    <div class="build-item" data-type="hut" draggable="true" title="小屋">🏚️</div>
                    <div class="build-item" data-type="storage" draggable="true" title="仓库">📦</div>
                </div>
            </div>
            
            <div class="category-group">
                <button class="category-btn" data-category="production">
                    <span class="category-icon">🌾</span>
                    <span class="category-name">生产</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="production">
                    <div class="build-item" data-type="farm" draggable="true" title="农田">🌾</div>
                    <div class="build-item" data-type="fishing" draggable="true" title="捕鱼站">🎣</div>
                    <div class="build-item" data-type="campfire" draggable="true" title="篝火">🔥</div>
                    <div class="build-item" data-type="well" draggable="true" title="水井">⛏️</div>
                </div>
            </div>
            
            <div class="category-group">
                <button class="category-btn" data-category="storage">
                    <span class="category-icon">📦</span>
                    <span class="category-name">仓库</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="storage">
                    <div class="build-item" data-type="storage" draggable="true" title="仓库">📦</div>
                    <div class="build-item" data-type="storageHouse" draggable="true" title="储物仓库 - 扩容资源存储">🏠</div>
                </div>
            </div>
            
            <div class="build-item inventory-btn" data-action="toggle-inventory" title="打开背包">📭</div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="info-panel">
            <div class="info-item">
                <label>🪵 木材</label>
                <value id="wood">100</value>
            </div>
            <div class="info-item">
                <label>🪨 石头</label>
                <value id="stone">50</value>
            </div>
            <div class="info-item">
                <label>🍖 食物</label>
                <value id="food">30</value>
            </div>
            <div class="info-item">
                <label>💧 淡水</label>
                <value id="water">50</value>
            </div>
            <div class="info-item">
                <label>💰 金币</label>
                <value id="gold">0</value>
            </div>
            <div class="info-item">
                <label>🏗️ 建筑</label>
                <value id="buildings">0</value>
            </div>
            <button id="reset-btn">🔄 重置存档</button>
        </div>
    </div>
    
    <div id="drag-overlay">
        <div class="drag-item" id="drag-preview"></div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
