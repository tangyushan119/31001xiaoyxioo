<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海岛生存建造游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #build-panel {
            width: 120px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .category-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .category-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(74, 222, 128, 0.5);
            transform: translateX(2px);
        }

        .category-btn.active {
            background: rgba(74, 222, 128, 0.3);
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .category-icon {
            font-size: 18px;
        }

        .category-name {
            flex: 1;
            text-align: center;
            margin: 0 8px;
        }

        .category-arrow {
            font-size: 12px;
            transition: transform 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .category-btn.active .category-arrow {
            transform: rotate(90deg);
        }

        .sub-items {
            display: none;
            flex-direction: column;
            gap: 6px;
            padding-left: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sub-items.expanded {
            display: flex;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .build-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            cursor: grab;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            background: rgba(255, 255, 255, 0.15);
            user-select: none;
        }

        .build-item:hover {
            transform: scale(1.1);
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .build-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .build-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .build-item.can-afford {
            border-color: rgba(74, 222, 128, 0.5);
            background: rgba(74, 222, 128, 0.1);
            animation: afford-glow 2s ease-in-out infinite;
        }

        @keyframes afford-glow {
            0%, 100% { 
                box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
                border-color: rgba(74, 222, 128, 0.5);
            }
            50% { 
                box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
                border-color: rgba(74, 222, 128, 0.8);
            }
        }

        .build-item.selected {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.3);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            animation: selected-pulse 1.5s ease-in-out infinite;
        }

        @keyframes selected-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
            50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.8); }
        }

        .build-item.inventory-btn {
            cursor: pointer;
            background: rgba(52, 152, 219, 0.3);
            border-color: rgba(52, 152, 219, 0.5);
        }

        .build-item.inventory-btn:hover {
            transform: scale(1.1);
            border-color: #3498db;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
            background: rgba(52, 152, 219, 0.4);
        }

        #game-canvas {
            flex: 1;
            display: block;
            background: #1a1a2e;
        }

        #info-panel {
            width: 180px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100vh - 30px);
        }

        .resources-header {
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .resources-header h4 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: #4ade80;
        }

        .resources-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .resource-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(3px);
        }

        .resource-emoji {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .resource-name {
            flex: 1;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .resource-item value {
            font-size: 14px;
            font-weight: 600;
            color: #4ade80;
            min-width: 40px;
            text-align: right;
        }

        .info-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }

        .info-item label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .info-item value {
            font-size: 20px;
            font-weight: bold;
            color: #4ade80;
        }

        #reset-btn {
            margin-top: auto;
            padding: 10px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #reset-btn:hover {
            background: rgba(231, 76, 60, 1);
            transform: scale(1.05);
        }

        #drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-size: 24px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #drag-overlay.active {
            display: flex;
        }

        #drag-overlay .drag-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 2px solid #4ade80;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1001;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .inventory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            display: none;
            pointer-events: auto;
        }

        .inventory-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .inventory-header {
            margin-bottom: 15px;
        }

        .inventory-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .close-btn {
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(231, 76, 60, 1);
            transform: scale(1.1);
        }

        .gold-display {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            margin-bottom: 8px;
        }

        .gold-emoji {
            font-size: 18px;
        }

        .gold-amount {
            color: #fbbf24;
            font-size: 16px;
            font-weight: 700;
        }

        .inventory-header h3 {
            color: white;
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .storage-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .storage-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .storage-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 4px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .storage-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            min-width: 60px;
            text-align: right;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-tab:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .category-tab.active {
            background: #4ade80;
            color: #1a1a2e;
            font-weight: 600;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .inventory-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .inventory-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }

        .item-emoji {
            font-size: 28px;
            line-height: 1;
        }

        .item-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-top: 4px;
        }

        .inventory-tooltip {
            position: fixed;
            background: rgba(30, 30, 50, 0.95);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            pointer-events: none;
            min-width: 150px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tooltip-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tooltip-emoji {
            font-size: 20px;
        }

        .tooltip-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .tooltip-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        .tooltip-info strong {
            color: #4ade80;
        }

        .soldier-train-btn {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .soldier-train-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .ship-build-btn {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }

        .ship-build-btn:hover {
            background: rgba(34, 197, 94, 0.3);
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        .ship-build-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        #sail-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 360px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sail-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sail-panel-header h3 {
            color: white;
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        .section-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .ships-list, .destinations-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .ship-item, .destination-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .ship-item:hover, .destination-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .ship-item.selected, .destination-item.selected {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .ship-item.disabled, .destination-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .ship-emoji, .destination-emoji {
            font-size: 28px;
        }

        .ship-name, .destination-name {
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        .destination-danger {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 3px;
        }

        .danger-high {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .danger-extreme {
            background: rgba(236, 72, 153, 0.2);
            color: #ec4899;
        }

        .sail-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        .info-value {
            color: #4ade80;
            font-size: 13px;
            font-weight: 600;
        }

        .sail-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sail-button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .sail-button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .sail-requirement {
            font-size: 11px;
            color: #ef4444;
            margin-top: 8px;
            text-align: center;
        }

        #ship-building-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ship-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ship-panel-header h3 {
            color: white;
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        .ship-panel-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .ship-panel-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
        }

        .ship-types-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ship-type-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .ship-type-item:hover:not(.disabled) {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.5);
            transform: translateX(5px);
        }

        .ship-type-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ship-emoji {
            font-size: 32px;
        }

        .ship-info {
            flex: 1;
        }

        .ship-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .ship-cost {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
        }

        .ship-stats {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .owned-ships-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .owned-ship-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(59, 130, 246, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .owned-ship-emoji {
            font-size: 24px;
        }

        .owned-ship-name {
            color: white;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="build-panel">
            <div class="category-group">
                <button class="category-btn" data-category="buildings">
                    <span class="category-icon">🏠</span>
                    <span class="category-name">建筑</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="buildings">
                    <div class="build-item" data-type="residence" draggable="true" title="民居 - 自动产金币">🏠</div>
                    <div class="build-item" data-type="storageHouse" draggable="true" title="储物仓库 - 扩容资源存储">🏠</div>
                    <div class="build-item" data-type="house" draggable="true" title="房屋">🏠</div>
                    <div class="build-item" data-type="hut" draggable="true" title="小屋">🏚️</div>
                    <div class="build-item" data-type="storage" draggable="true" title="仓库">📦</div>
                </div>
            </div>
            
            <div class="category-group">
                <button class="category-btn" data-category="production">
                    <span class="category-icon">🌾</span>
                    <span class="category-name">生产</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="production">
                    <div class="build-item" data-type="farm" draggable="true" title="农田">🌾</div>
                    <div class="build-item" data-type="fishing" draggable="true" title="捕鱼站">🎣</div>
                    <div class="build-item" data-type="campfire" draggable="true" title="篝火">🔥</div>
                    <div class="build-item" data-type="well" draggable="true" title="水井">⛏️</div>
                </div>
            </div>
            
            <div class="category-group">
                <button class="category-btn" data-category="storage">
                    <span class="category-icon">📦</span>
                    <span class="category-name">仓库</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="storage">
                    <div class="build-item" data-type="storage" draggable="true" title="仓库">📦</div>
                    <div class="build-item" data-type="storageHouse" draggable="true" title="储物仓库 - 扩容资源存储">🏠</div>
                </div>
            </div>
            
            <div class="category-group">
                <button class="category-btn" data-category="defense">
                    <span class="category-icon">🛡️</span>
                    <span class="category-name">防御</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="defense">
                    <div class="build-item" data-type="machineGun" draggable="true" title="机枪炮塔 - 快速攻击，中等伤害">🔫</div>
                    <div class="build-item" data-type="catapult" draggable="true" title="投石炮塔 - 慢速攻击，高伤害">🪨</div>
                </div>
            </div>
            
            <div class="category-group">
                <button class="category-btn" data-category="barracks">
                    <span class="category-icon">🏰</span>
                    <span class="category-name">兵营</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="barracks">
                    <div class="build-item soldier-train-btn" data-soldier="infantry" title="训练步兵 - 消耗: 20💰 + 10🌾">⚔️</div>
                    <div class="build-item soldier-train-btn" data-soldier="archer" title="训练弓箭手 - 消耗: 35💰 + 15🌾">🏹</div>
                </div>
            </div>
            
            <div class="category-group">
                <button class="category-btn" data-category="dock">
                    <span class="category-icon">⛵</span>
                    <span class="category-name">码头</span>
                    <span class="category-arrow">▶</span>
                </button>
                <div class="sub-items" data-category="dock">
                    <div class="build-item" data-type="dock" draggable="true" title="码头 - 建造船只的必要设施\n消耗: 80🪵 + 40🪨">⛵</div>
                    <div class="build-item ship-build-btn" data-ship="smallShip" title="小型船 - 消耗: 50🪵 + 20💎">🛶</div>
                    <div class="build-item ship-build-btn" data-ship="largeShip" title="大型船 - 消耗: 120🪵 + 50💎 + 50💰">🚢</div>
                    <div class="build-item ship-build-btn" data-ship="warShip" title="战船 - 消耗: 100🪵 + 80💎 + 80💰">⚓</div>
                </div>
            </div>
            
            <div class="build-item inventory-btn" data-action="toggle-inventory" title="打开背包">📭</div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="info-panel">
            <div class="resources-header">
                <h4>📦 资源面板</h4>
            </div>
            <div class="resources-grid">
                <div class="resource-item">
                    <span class="resource-emoji">🪵</span>
                    <span class="resource-name">木材</span>
                    <value id="wood">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🪨</span>
                    <span class="resource-name">石头</span>
                    <value id="stone">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">💎</span>
                    <span class="resource-name">矿石</span>
                    <value id="ore">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">💰</span>
                    <span class="resource-name">金币</span>
                    <value id="gold">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🍎</span>
                    <span class="resource-name">苹果</span>
                    <value id="apple">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🍐</span>
                    <span class="resource-name">梨子</span>
                    <value id="pear">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🌱</span>
                    <span class="resource-name">树木种子</span>
                    <value id="treeSeed">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🍑</span>
                    <span class="resource-name">水果种子</span>
                    <value id="fruitSeed">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🌾</span>
                    <span class="resource-name">小麦种子</span>
                    <value id="wheatSeed">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🥕</span>
                    <span class="resource-name">胡萝卜种子</span>
                    <value id="carrotSeed">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🍅</span>
                    <span class="resource-name">番茄种子</span>
                    <value id="tomatoSeed">200</value>
                </div>
                <div class="resource-item">
                    <span class="resource-emoji">🌽</span>
                    <span class="resource-name">玉米种子</span>
                    <value id="cornSeed">200</value>
                </div>
            </div>
            <button id="reset-btn">🔄 重置存档</button>
        </div>
    </div>
    
    <div id="drag-overlay">
        <div class="drag-item" id="drag-preview"></div>
    </div>

    <div id="sail-panel" style="display: none;">
        <div class="sail-panel-header">
            <h3>🚢 远航</h3>
            <button class="close-btn" onclick="document.getElementById('sail-panel').style.display = 'none'">×</button>
        </div>
        <div class="sail-ship-select">
            <div class="section-title">选择船只</div>
            <div class="ships-list" id="ships-list"></div>
        </div>
        <div class="sail-destinations">
            <div class="section-title">选择目的地</div>
            <div class="destinations-list" id="destinations-list"></div>
        </div>
        <div class="sail-info">
            <div class="info-row">
                <span class="info-label">粮食消耗:</span>
                <span class="info-value" id="sail-food-cost">0 🌾</span>
            </div>
            <div class="info-row">
                <span class="info-label">当前粮食:</span>
                <span class="info-value" id="current-food">0 🌾</span>
            </div>
            <div class="info-row">
                <span class="info-label">当前士兵:</span>
                <span class="info-value" id="current-soldiers">0 ⚔️</span>
            </div>
        </div>
        <button id="sail-btn" class="sail-button" disabled>⛵ 出发远航</button>
    </div>

    <div id="ship-building-panel" style="display: none;">
        <div class="ship-panel-header">
            <h3>⛵ 造船工坊</h3>
            <button class="close-btn" onclick="document.getElementById('ship-building-panel').style.display = 'none'">×</button>
        </div>
        <div class="ship-panel-content">
            <div class="ship-panel-section">
                <div class="section-title">可建造船只</div>
                <div class="ship-types-list" id="ship-types-list"></div>
            </div>
            <div class="ship-panel-section">
                <div class="section-title">已拥有船只</div>
                <div class="owned-ships-list" id="owned-ships-list"></div>
            </div>
        </div>
        <button id="sail-from-ship-panel" class="sail-button" onclick="document.getElementById('ship-building-panel').style.display = 'none'; window.game.buildPanel.showSailPanel()">🚢 出发远航</button>
    </div>

    <script type="module" src="src/main.js"></script>
    <script type="module" src="test/test_dock_placement.js"></script>
    <script type="module" src="test/test_building_placement.js"></script>
</body>
</html>
