<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海岛生存建造游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #build-panel {
            width: 100px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .build-item {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            cursor: grab;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            background: rgba(255, 255, 255, 0.15);
            user-select: none;
        }

        .build-item:hover {
            transform: scale(1.1);
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .build-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .build-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #game-canvas {
            flex: 1;
            display: block;
            background: #1a1a2e;
        }

        #info-panel {
            width: 140px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }

        .info-item label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .info-item value {
            font-size: 20px;
            font-weight: bold;
            color: #4ade80;
        }

        #reset-btn {
            margin-top: auto;
            padding: 10px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #reset-btn:hover {
            background: rgba(231, 76, 60, 1);
            transform: scale(1.05);
        }

        #drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-size: 24px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #drag-overlay.active {
            display: flex;
        }

        #drag-overlay .drag-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 2px solid #4ade80;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1001;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="build-panel">
            <div class="build-item" data-type="house" draggable="true">🏠</div>
            <div class="build-item" data-type="hut" draggable="true">🏚️</div>
            <div class="build-item" data-type="storage" draggable="true">📦</div>
            <div class="build-item" data-type="farm" draggable="true">🌾</div>
            <div class="build-item" data-type="fishing" draggable="true">🎣</div>
            <div class="build-item" data-type="campfire" draggable="true">🔥</div>
            <div class="build-item" data-type="well" draggable="true">⛏️</div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="info-panel">
            <div class="info-item">
                <label>🪵 木材</label>
                <value id="wood">100</value>
            </div>
            <div class="info-item">
                <label>🪨 石头</label>
                <value id="stone">50</value>
            </div>
            <div class="info-item">
                <label>🍖 食物</label>
                <value id="food">30</value>
            </div>
            <div class="info-item">
                <label>💧 淡水</label>
                <value id="water">50</value>
            </div>
            <div class="info-item">
                <label>🏗️ 建筑</label>
                <value id="buildings">0</value>
            </div>
            <button id="reset-btn">🔄 重置存档</button>
        </div>
    </div>
    
    <div id="drag-overlay">
        <div class="drag-item" id="drag-preview"></div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
