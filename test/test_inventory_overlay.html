<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库弹窗遮罩层阻断交互测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        #test-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: #1a1a2e;
            border: 2px solid #4ade80;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .inventory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            display: none;
            pointer-events: auto;
        }

        .inventory-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .inventory-header {
            margin-bottom: 15px;
        }
        
        .inventory-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .close-btn {
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .gold-display {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            margin-bottom: 8px;
        }
        
        .gold-emoji {
            font-size: 18px;
        }
        
        .gold-amount {
            color: #fbbf24;
            font-size: 16px;
            font-weight: 700;
        }
        
        .storage-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .storage-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .storage-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 4px;
        }
        
        .storage-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            min-width: 60px;
            text-align: right;
        }
        
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .category-tab {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
        }
        
        .category-tab.active {
            background: #4ade80;
            color: #1a1a2e;
            font-weight: 600;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .inventory-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .item-emoji {
            font-size: 28px;
        }
        
        .item-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-top: 4px;
        }
        
        .test-controls {
            display: flex;
            gap: 10px;
        }
        
        .test-btn {
            padding: 10px 20px;
            background: rgba(74, 222, 128, 0.8);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-btn:hover {
            background: #4ade80;
            transform: scale(1.05);
        }
        
        #test-output {
            width: 800px;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        
        .success {
            color: #4ade80;
        }
        
        .error {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div id="test-container">
        <h1>仓库弹窗遮罩层阻断交互测试</h1>
        <div id="game-container">
            <canvas id="game-canvas"></canvas>
        </div>
        <div class="test-controls">
            <button class="test-btn" onclick="runTests()">运行测试</button>
            <button class="test-btn" onclick="showPanel()">显示弹窗</button>
            <button class="test-btn" onclick="hidePanel()">隐藏弹窗</button>
            <button class="test-btn" onclick="togglePanel()">切换弹窗</button>
        </div>
        <div id="test-output"></div>
    </div>

    <script type="module">
        import { runTests, MockGame } from './test_inventory_overlay.js';
        import { InventoryPanel } from '../src/components/InventoryPanel.js';
        
        let inventoryPanel = null;
        let output = document.getElementById('test-output');
        
        function log(message, type = 'info') {
            const color = type === 'success' ? '#4ade80' : type === 'error' ? '#ef4444' : '#ffffff';
            output.innerHTML += `<span style="color:${color}">${message}</span>\n`;
            output.scrollTop = output.scrollHeight;
        }
        
        function clearOutput() {
            output.innerHTML = '';
        }
        
        window.runTests = function() {
            clearOutput();
            runTests();
        }
        
        function showPanel() {
            if (!inventoryPanel) {
                const game = new MockGame();
                inventoryPanel = new InventoryPanel(game);
                game.setInventoryPanel(inventoryPanel);
            }
            inventoryPanel.show();
        }
        
        function hidePanel() {
            if (inventoryPanel) {
                inventoryPanel.hide();
            }
        }
        
        function togglePanel() {
            if (!inventoryPanel) {
                const game = new MockGame();
                inventoryPanel = new InventoryPanel(game);
                game.setInventoryPanel(inventoryPanel);
            }
            inventoryPanel.toggle();
        }
    </script>
</body>
</html>
