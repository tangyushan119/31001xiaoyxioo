<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库弹窗居中测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        #test-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: #1a1a2e;
            border: 2px solid #4ade80;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .inventory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            display: none;
            pointer-events: auto;
        }

        .inventory-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .inventory-header {
            margin-bottom: 15px;
        }
        
        .inventory-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .close-btn {
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .gold-display {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            margin-bottom: 8px;
        }
        
        .gold-emoji {
            font-size: 18px;
        }
        
        .gold-amount {
            color: #fbbf24;
            font-size: 16px;
            font-weight: 700;
        }
        
        .storage-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .storage-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .storage-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 4px;
        }
        
        .storage-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            min-width: 60px;
            text-align: right;
        }
        
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .category-tab {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
        }
        
        .category-tab.active {
            background: #4ade80;
            color: #1a1a2e;
            font-weight: 600;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .inventory-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .item-emoji {
            font-size: 28px;
        }
        
        .item-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-top: 4px;
        }
        
        .test-controls {
            display: flex;
            gap: 10px;
        }
        
        .test-btn {
            padding: 10px 20px;
            background: rgba(74, 222, 128, 0.8);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-btn:hover {
            background: #4ade80;
            transform: scale(1.05);
        }
        
        #test-output {
            width: 800px;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        
        .success {
            color: #4ade80;
        }
        
        .error {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div id="test-container">
        <h1>仓库弹窗居中测试</h1>
        <div id="game-container">
            <canvas id="game-canvas"></canvas>
        </div>
        <div class="test-controls">
            <button class="test-btn" onclick="runTests()">运行测试</button>
            <button class="test-btn" onclick="showPanel()">显示弹窗</button>
            <button class="test-btn" onclick="hidePanel()">隐藏弹窗</button>
            <button class="test-btn" onclick="togglePanel()">切换弹窗</button>
        </div>
        <div id="test-output"></div>
    </div>

    <script type="module">
        import { InventoryPanel } from '../src/components/InventoryPanel.js';
        
        let inventoryPanel = null;
        let output = document.getElementById('test-output');
        
        function log(message, type = 'info') {
            const color = type === 'success' ? '#4ade80' : type === 'error' ? '#ef4444' : '#ffffff';
            output.innerHTML += `<span style="color:${color}">${message}</span>\n`;
            output.scrollTop = output.scrollHeight;
        }
        
        function clearOutput() {
            output.innerHTML = '';
        }
        
        class MockGame {
            constructor() {
                this.storage = {
                    getResources: () => ({ wood: 100, stone: 50, food: 30, water: 50, gold: 10 }),
                    getAllResourceInfo: () => ({
                        wood: { name: '木材', emoji: '🪵', category: 'materials' },
                        stone: { name: '石头', emoji: '🪨', category: 'materials' },
                        food: { name: '食物', emoji: '🍖', category: 'consumables' },
                        water: { name: '淡水', emoji: '💧', category: 'consumables' },
                        gold: { name: '金币', emoji: '💰', category: 'currency' }
                    }),
                    getResourceCategories: () => ({
                        materials: { name: '材料' },
                        consumables: { name: '消耗品' },
                        currency: { name: '货币' }
                    }),
                    getResourceInfo: (key) => ({
                        wood: { name: '木材', emoji: '🪵' },
                        stone: { name: '石头', emoji: '🪨' },
                        food: { name: '食物', emoji: '🍖' },
                        water: { name: '淡水', emoji: '💧' },
                        gold: { name: '金币', emoji: '💰' }
                    }[key]),
                    getResource: (key) => ({ wood: 100, stone: 50, food: 30, water: 50, gold: 10 }[key]),
                    getTotalResourceAmount: () => 240,
                    getStorageCapacity: () => 500,
                    getResourcesByCategory: () => ({})
                };
            }
            
            getStorage() {
                return this.storage;
            }
        }
        
        function runTests() {
            clearOutput();
            log('=== 仓库弹窗测试 ===\n');
            
            setTimeout(async () => {
                try {
                    const game = new MockGame();
                    inventoryPanel = new InventoryPanel(game);
                    
                    log('1. 测试弹窗初始状态（应隐藏）');
                    const panel = document.getElementById('inventory-panel');
                    log(`   - 初始display状态: ${panel.style.display}`);
                    if (panel.style.display === 'none') {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - 弹窗初始状态应该为隐藏', 'error');
                    }
                    
                    log('\n2. 测试遮罩层初始状态（应隐藏）');
                    const overlay = document.getElementById('inventory-overlay');
                    log(`   - 遮罩层初始display状态: ${overlay.style.display}`);
                    if (overlay.style.display === 'none') {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - 遮罩层初始状态应该为隐藏', 'error');
                    }
                    
                    log('\n3. 测试show()方法显示弹窗和遮罩层');
                    inventoryPanel.show();
                    log(`   - show()后弹窗display状态: ${panel.style.display}`);
                    log(`   - show()后遮罩层display状态: ${overlay.style.display}`);
                    if (panel.style.display === 'block' && overlay.style.display === 'block') {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - show后弹窗和遮罩层都应该显示', 'error');
                    }
                    
                    log('\n4. 测试弹窗居中位置');
                    const canvas = document.getElementById('game-canvas');
                    const canvasRect = canvas.getBoundingClientRect();
                    const panelRect = panel.getBoundingClientRect();
                    
                    const expectedLeft = canvasRect.left + (canvasRect.width - panelRect.width) / 2;
                    const expectedTop = canvasRect.top + (canvasRect.height - panelRect.height) / 2;
                    
                    const actualLeft = parseFloat(panel.style.left);
                    const actualTop = parseFloat(panel.style.top);
                    
                    log(`   - 画布位置: left=${canvasRect.left.toFixed(2)}, top=${canvasRect.top.toFixed(2)}`);
                    log(`   - 画布尺寸: width=${canvasRect.width}, height=${canvasRect.height}`);
                    log(`   - 弹窗尺寸: width=${panelRect.width}, height=${panelRect.height}`);
                    log(`   - 期望位置: left=${expectedLeft.toFixed(2)}, top=${expectedTop.toFixed(2)}`);
                    log(`   - 实际位置: left=${actualLeft.toFixed(2)}, top=${actualTop.toFixed(2)}`);
                    
                    const leftDiff = Math.abs(actualLeft - expectedLeft);
                    const topDiff = Math.abs(actualTop - expectedTop);
                    
                    log(`   - 位置偏差: left=${leftDiff.toFixed(2)}px, top=${topDiff.toFixed(2)}px`);
                    if (leftDiff < 1 && topDiff < 1) {
                        log('   ✅ 通过', 'success');
                    } else {
                        log(`   ❌ 失败 - 位置偏差过大`, 'error');
                    }
                    
                    log('\n5. 测试遮罩层样式属性');
                    const overlayStyle = getComputedStyle(overlay);
                    log(`   - 遮罩层position: ${overlayStyle.position}`);
                    log(`   - 遮罩层zIndex: ${overlayStyle.zIndex}`);
                    if (overlayStyle.position === 'fixed' && parseInt(overlayStyle.zIndex) === 99) {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - 遮罩层样式属性不正确', 'error');
                    }
                    
                    log('\n6. 测试hide()方法隐藏弹窗和遮罩层');
                    inventoryPanel.hide();
                    log(`   - hide()后弹窗display状态: ${panel.style.display}`);
                    log(`   - hide()后遮罩层display状态: ${overlay.style.display}`);
                    if (panel.style.display === 'none' && overlay.style.display === 'none') {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - hide后弹窗和遮罩层都应该隐藏', 'error');
                    }
                    
                    log('\n7. 测试toggle()方法切换状态');
                    inventoryPanel.toggle();
                    log(`   - toggle()第一次后弹窗display状态: ${panel.style.display}`);
                    log(`   - toggle()第一次后遮罩层display状态: ${overlay.style.display}`);
                    if (panel.style.display === 'block' && overlay.style.display === 'block') {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - toggle()第一次应该显示弹窗和遮罩层', 'error');
                    }
                    
                    inventoryPanel.toggle();
                    log(`   - toggle()第二次后弹窗display状态: ${panel.style.display}`);
                    log(`   - toggle()第二次后遮罩层display状态: ${overlay.style.display}`);
                    if (panel.style.display === 'none' && overlay.style.display === 'none') {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - toggle()第二次应该隐藏弹窗和遮罩层', 'error');
                    }
                    
                    log('\n8. 测试遮罩层阻断点击事件');
                    inventoryPanel.show();
                    let canvasClicked = false;
                    canvas.addEventListener('click', () => {
                        canvasClicked = true;
                    });
                    
                    const overlayRect = overlay.getBoundingClientRect();
                    const clickEvent = new MouseEvent('click', {
                        clientX: overlayRect.left + overlayRect.width / 2,
                        clientY: overlayRect.top + overlayRect.height / 2,
                        bubbles: true
                    });
                    overlay.dispatchEvent(clickEvent);
                    
                    log(`   - 点击遮罩层后canvas是否被点击: ${canvasClicked}`);
                    if (!canvasClicked) {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - 遮罩层应该阻断canvas点击', 'error');
                    }
                    
                    canvas.removeEventListener('click', () => { canvasClicked = true; });
                    inventoryPanel.hide();
                    
                    log('\n9. 测试弹窗背景是否为非透明');
                    const panelStyle = getComputedStyle(panel);
                    const bgColor = panelStyle.backgroundColor;
                    log(`   - 弹窗背景色: ${bgColor}`);
                    if (bgColor !== 'rgba(255, 255, 255, 0.1)') {
                        log('   ✅ 通过', 'success');
                    } else {
                        log('   ❌ 失败 - 弹窗背景不应该是透明效果', 'error');
                    }
                    
                    log('\n✅ 所有测试完成！');
                    
                } catch (error) {
                    log(`❌ 测试异常: ${error.message}`, 'error');
                    console.error(error);
                }
            }, 100);
        }
        
        function showPanel() {
            if (!inventoryPanel) {
                const game = new MockGame();
                inventoryPanel = new InventoryPanel(game);
            }
            inventoryPanel.show();
        }
        
        function hidePanel() {
            if (inventoryPanel) {
                inventoryPanel.hide();
            }
        }
        
        function togglePanel() {
            if (!inventoryPanel) {
                const game = new MockGame();
                inventoryPanel = new InventoryPanel(game);
            }
            inventoryPanel.toggle();
        }
    </script>
</body>
</html>
